<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template — Editorial Magazine Stories · MARCA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700;800&family=Playfair+Display:wght@700;800&display=swap');
    :root {
  --ds-preview-w: 420px;
  --ds-preview-h: 525px;
  --ds-export-w: 1080px;
  --ds-export-h: 1350px;
  --ds-scale: 2.5714285714;

  --ds-space-1: 8px;
  --ds-space-2: 16px;
  --ds-space-3: 24px;
  --ds-space-4: 32px;
  --ds-space-5: 40px;
  --ds-space-6: 48px;
  --ds-space-7: 56px;
  --ds-space-8: 64px;

  --ds-radius-sm: 10px;
  --ds-radius-md: 16px;
  --ds-radius-lg: 24px;
  --ds-shadow-soft: 0 18px 50px rgba(0, 0, 0, 0.22);
  --ds-shadow-text: 0 3px 16px rgba(0, 0, 0, 0.28);

  --ds-font-hero: 34px;
  --ds-font-heading: 26px;
  --ds-font-body: 19px;
  --ds-font-caption: 13px;
  --ds-export-font-hero: 82px;
  --ds-export-font-heading: 62px;
  --ds-export-font-body: 40px;
  --ds-export-font-caption: 28px;

  --ds-content-pad-x: 36px;
  --ds-export-content-pad-x: 80px;
}

    :root {
  --style-name: "editorial-magazine";
  --style-bg: #F5F0E8;
  --style-bg-alt: #E8D5C4;
  --style-surface: rgba(255, 255, 255, 0.07);
  --style-surface-strong: rgba(255, 255, 255, 0.12);
  --style-text-heading: #2D2318;
  --style-text-body: #5C4033;
  --style-text-muted: #8B7355;
  --style-accent: #722F37;
  --style-accent-soft: color-mix(in srgb, #722F37 22%, transparent);
  --style-border: color-mix(in srgb, #722F37 42%, transparent);
  --style-heading-font: "Playfair Display", Georgia, serif;
  --style-body-font: "DM Sans", Arial, sans-serif;
  --style-noise-opacity: 0.025;
  --style-vignette-opacity: 0.18;
  --style-gradient: radial-gradient(circle at 22% 12%, color-mix(in srgb, #722F37 20%, transparent), transparent 34%), linear-gradient(145deg, #F5F0E8 0%, #E8D5C4 58%, #F5F0E8 100%);
}



    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      background: #111;
      color: var(--style-text-body);
      font-family: var(--style-body-font);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .stories-frame {
      width: 360px;
      height: 640px;
      background: #000;
      border-radius: 18px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      position: relative;
    }

    .stories-viewport {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      background: var(--style-bg);
    }

    .stories-track {
      height: 100%;
      display: flex;
      flex-direction: column;
      transform: translateY(0);
      transition: transform 260ms ease;
    }

    .frame {
      min-height: 100%;
      height: 640px;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      isolation: isolate;
      background: var(--style-gradient);
      color: var(--style-text-body);
      padding: 56px 24px 70px;
    }

    .frame::before {
      content: "";
      position: absolute; inset: 0; z-index: 0;
      opacity: var(--style-noise-opacity);
      background-image:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,0.9) 0 1px, transparent 1px),
        radial-gradient(circle at 75% 54%, rgba(255,255,255,0.72) 0 1px, transparent 1px);
      background-size: 13px 13px, 19px 19px;
      pointer-events: none;
    }

    .frame::after {
      content: "";
      position: absolute; inset: 0; z-index: 0;
      background: radial-gradient(circle at center, transparent 28%, rgba(0,0,0,var(--style-vignette-opacity)) 100%);
      pointer-events: none;
    }

    .brand-mark {
      position: absolute; top: 16px; left: 16px; z-index: 3;
      color: var(--style-accent);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .content-creative {
      position: relative; z-index: 2;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 10px;
      text-align: left;
    }

    .content-creative.center { align-items: center; text-align: center; }

    .eyebrow {
      display: inline-flex; align-items: center; width: fit-content;
      color: var(--style-accent);
      background: var(--style-accent-soft);
      border: 1px solid var(--style-border);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .title {
      color: var(--style-text-heading);
      font-family: var(--style-heading-font);
      font-size: 22px;
      font-weight: 800;
      line-height: 1.05;
    }

    .body-text {
      max-width: 280px;
      color: var(--style-text-body);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.4;
    }

    .cta-block {
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--style-border);
      color: var(--style-text-heading);
      background: linear-gradient(135deg, var(--style-accent-soft), rgba(255,255,255,0.04));
      font-size: 9px;
      font-weight: 800;
    }

    .stories-progress {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; gap: 4px;
      padding: 8px 12px;
    }

    .stories-progress .seg {
      flex: 1; height: 3px;
      background: rgba(255,255,255,0.20);
      border-radius: 2px;
      overflow: hidden;
    }

    .stories-progress .seg.active { background: rgba(255,255,255,0.85); }

    .nav-overlay {
      position: absolute; top: 0; bottom: 0; width: 40%;
      z-index: 10; cursor: pointer;
    }

    .nav-overlay.prev { left: 0; }
    .nav-overlay.next { right: 0; }

    body.export-mode {
      width: 1080px; height: 1920px;
      min-height: auto; overflow: hidden;
      padding: 0; background: #000;
      display: block;
    }

    body.export-mode .stories-frame {
      width: 1080px; height: 1920px;
      border-radius: 0; box-shadow: none;
    }

    body.export-mode .stories-viewport {
      width: 1080px; height: 1920px;
    }

    body.export-mode .stories-track {
      width: max-content;
      height: 1920px;
      transition: none !important;
    }

    body.export-mode .frame {
      width: 1080px; min-width: 1080px; max-width: 1080px;
      min-height: 1920px; height: 1920px; max-height: 1920px;
      padding: 140px 60px 160px;
      overflow: hidden;
    }

    body.export-mode .stories-progress,
    body.export-mode .nav-overlay,
    body.export-mode .brand-mark { display: none !important; }

    body.export-mode .title { font-size: 56px; }
    body.export-mode .body-text { max-width: 840px; font-size: 28px; }
    body.export-mode .eyebrow { font-size: 20px; padding: 10px 20px; }
    body.export-mode .cta-block { padding: 18px 28px; font-size: 22px; }
  </style>
</head>
<body>
  <div class="stories-frame">
    <div class="stories-viewport">
      <div class="stories-track" id="storiesTrack">
        
        <section class="frame frame-1 cover" data-text-variant="light" style=''>
          <span class="brand-mark">MARCA</span>
          <div class="content-creative center">
            <span class="eyebrow">ENQUETE</span>
            <h1 class="title">Pergunta para engajar</h1>
            <p class="body-text">Contexto rápido para a pergunta</p>
            
          </div>
        </section>

        <section class="frame frame-2 content" data-text-variant="light" style='background: radial-gradient(circle at 22% 12%, var(--style-accent-soft), transparent 34%), linear-gradient(145deg, #F5F0E8, var(--style-bg-alt));'>
          <span class="brand-mark">MARCA</span>
          <div class="content-creative ">
            <span class="eyebrow">DICA 1</span>
            <h2 class="heading">Primeira dica rápida</h2>
            <p class="body-text">Uma ideia por frame. Stories são rápidos.</p>
            
          </div>
        </section>

        <section class="frame frame-3 content" data-text-variant="light" style='background: radial-gradient(circle at 22% 12%, var(--style-accent-soft), transparent 34%), linear-gradient(145deg, #E8D5C4, var(--style-bg-alt));'>
          <span class="brand-mark">MARCA</span>
          <div class="content-creative ">
            <span class="eyebrow">DICA 2</span>
            <h2 class="heading">Segunda dica</h2>
            <p class="body-text">Mantenha o ritmo acelerado.</p>
            
          </div>
        </section>

        <section class="frame frame-4 cta" data-text-variant="light" style='background: radial-gradient(circle at 22% 12%, var(--style-accent-soft), transparent 34%), linear-gradient(145deg, #722F37, #5C4033);'>
          <span class="brand-mark">MARCA</span>
          <div class="content-creative center">
            <span class="eyebrow">MARCA</span>
            <h2 class="heading">Responda nos comentários</h2>
            <p class="body-text">Sua opinião importa</p>
            
          </div>
        </section>
      </div>
    </div>
    <div class="stories-progress" id="storyProgress"><div class="seg active"></div><div class="seg "></div><div class="seg "></div><div class="seg "></div></div>
    <div class="nav-overlay prev" onclick="prevFrame()"></div>
    <div class="nav-overlay next" onclick="nextFrame()"></div>
  </div>
  <script>
    const track = document.getElementById('storiesTrack');
    const segs = [...document.querySelectorAll('#storyProgress .seg')];
    let current = 0;

    function showFrame(index) {
      current = Math.max(0, Math.min(index, segs.length - 1));
      track.style.transform = `translateY(-${current * 100}%)`;
      segs.forEach((seg, i) => seg.classList.toggle('active', i <= current));
    }

    function nextFrame() { showFrame(current + 1); }
    function prevFrame() { showFrame(current - 1); }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowDown') showFrame(current + 1);
      if (e.key === 'ArrowUp') showFrame(current - 1);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat da Squad - Social Growth Squad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0C5CAB; --surface: #09090B; --surface-elevated: #121216; --text: #FAFAFA; --text-muted: #A1A1AA; --border: rgba(255,255,255,0.08); --assistant: #141419; --user: #0C5CAB; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: var(--surface); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; display: grid; grid-template-rows: auto 1fr auto; }
    .topbar { height: 58px; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 0 22px; border-bottom: 1px solid var(--border); background: rgba(18,18,22,0.9); backdrop-filter: blur(14px); position: sticky; top: 0; z-index: 2; }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-mark { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; background: linear-gradient(135deg, var(--primary), #0A4A8A); font-size: 12px; font-weight: 800; }
    .brand-title { font-size: 14px; font-weight: 700; white-space: nowrap; }
    .brand-subtitle { color: var(--text-muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topbar-actions { display: flex; align-items: center; gap: 10px; }
    .nav-link { color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 600; padding: 8px 10px; border: 1px solid var(--border); border-radius: 10px; }
    .nav-link:hover { color: var(--text); border-color: rgba(255,255,255,0.18); }
    .chat-shell { width: min(920px, 100%); margin: 0 auto; padding: 28px 18px 110px; }
    .message-list { display: grid; gap: 18px; }
    .message { display: grid; grid-template-columns: 34px minmax(0, 1fr); gap: 12px; align-items: start; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center; font-size: 12px; font-weight: 800; background: var(--assistant); border: 1px solid var(--border); color: var(--text); }
    .message.user .avatar { background: var(--user); border-color: transparent; }
    .bubble { border: 1px solid var(--border); background: var(--assistant); border-radius: 18px; padding: 16px 18px; line-height: 1.55; font-size: 15px; }
    .message.user .bubble { background: rgba(12,92,171,0.2); border-color: rgba(124,194,255,0.24); }
    .bubble h3 { font-size: 15px; margin-bottom: 10px; }
    .bubble p + p { margin-top: 10px; }
    .bubble ul { margin: 10px 0 0 18px; color: var(--text-muted); }
    .bubble li + li { margin-top: 6px; }
    .muted { color: var(--text-muted); }
    .starter-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-top: 14px; }
    .starter { text-align: left; color: var(--text); background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 14px; padding: 12px; cursor: pointer; font: inherit; font-size: 13px; line-height: 1.35; }
    .starter:hover { border-color: rgba(124,194,255,0.5); background: rgba(12,92,171,0.14); }
    .composer-wrap { position: fixed; left: 0; right: 0; bottom: 0; padding: 16px; background: linear-gradient(180deg, rgba(9,9,11,0), var(--surface) 30%); }
    .composer { width: min(920px, 100%); margin: 0 auto; display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; border: 1px solid var(--border); background: var(--surface-elevated); border-radius: 18px; padding: 10px; box-shadow: 0 18px 60px rgba(0,0,0,0.35); }
    textarea { min-height: 46px; max-height: 160px; resize: none; border: 0; outline: none; background: transparent; color: var(--text); font: inherit; line-height: 1.45; padding: 10px; }
    textarea::placeholder { color: var(--text-muted); }
    .send { width: 42px; height: 42px; border: 0; border-radius: 12px; background: var(--primary); color: white; font-weight: 800; cursor: pointer; }
    .send:disabled { opacity: .45; cursor: not-allowed; }
    @media (max-width: 720px) { .brand-subtitle { display: none; } .starter-grid { grid-template-columns: 1fr; } .topbar { padding: 0 14px; } }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">SG</div>
      <div>
        <div class="brand-title">Chat da Squad</div>
        <div class="brand-subtitle">Terminal operacional por cliente</div>
      </div>
    </div>
    <div class="topbar-actions">
      <a class="nav-link" href="index.html">Dashboard</a>
      <a class="nav-link" href="campaigns.html">Campaigns</a>
    </div>
  </header>

  <main class="chat-shell">
    <div class="message-list" id="messageList"></div>
  </main>

  <form class="composer-wrap" id="composerForm">
    <div class="composer">
      <textarea id="promptInput" rows="1" placeholder="Digite o cliente e a intenção. Ex: AmiClube, conteúdo para esta semana"></textarea>
      <button class="send" id="sendButton" type="submit" aria-label="Enviar">↑</button>
    </div>
  </form>

  <script src="data.js"></script>
  <script src="articles-data.js"></script>
  <script>
    var messageList = document.getElementById('messageList');
    var promptInput = document.getElementById('promptInput');
    var composerForm = document.getElementById('composerForm');
    var chatHistory = JSON.parse(localStorage.getItem('socialGrowthChatHistory') || '[]');
    var activeMode = localStorage.getItem('socialGrowthChatMode') || 'normal';

    function getDashboardData() {
      return window.__DASHBOARD_DATA__ || {};
    }

    function getArticleData() {
      return window.__BLOG_ARTICLES_DATA__ || { items: [] };
    }

    function getClientName() {
      var data = getDashboardData();
      var clientId = data.client || 'amiclube';
      var client = Array.isArray(data.clients) ? data.clients.find(function(item) { return item.id === clientId; }) : null;
      return client && client.name ? client.name : clientId;
    }

    function getCampaignItems() {
      var data = getDashboardData();
      if (data.campaigns && Array.isArray(data.campaigns.items)) return data.campaigns.items;
      if (Array.isArray(data.queue)) return data.queue;
      return [];
    }

    function statusBucket(status) {
      var value = String(status || '').toLowerCase();
      if (value === 'published' || value.indexOf('aprov') !== -1 || value.indexOf('public') !== -1) return 'published';
      if (value === 'scheduled' || value.indexOf('agend') !== -1) return 'scheduled';
      if (value === 'review' || value.indexOf('revis') !== -1 || value.indexOf('preview') !== -1) return 'review';
      return 'draft';
    }

    function summarizeState() {
      var items = getCampaignItems();
      var articles = Array.isArray(getArticleData().items) ? getArticleData().items : [];
      var published = items.filter(function(item) { return statusBucket(item.status) === 'published'; }).length;
      var scheduled = items.filter(function(item) { return statusBucket(item.status) === 'scheduled'; }).length;
      var review = items.filter(function(item) { return statusBucket(item.status) === 'review'; }).length;
      var draft = items.length - published - scheduled - review;
      return { total: items.length, published: published, scheduled: scheduled, review: review, draft: draft, articles: articles.length };
    }

    function getNextAction(intent) {
      var state = summarizeState();
      var value = String(intent || '').toLowerCase();
      if (value.indexOf('monitor') !== -1) return 'Revisar publicações já publicadas e registrar sinais de performance antes de abrir novo ciclo.';
      if (value.indexOf('artigo') !== -1 || value.indexOf('blog') !== -1) return 'Abrir a página Artigo e validar quais briefings ainda precisam de revisão ou publicação.';
      if (state.review > 0) return 'Aprovar ou corrigir os assets em revisão antes de avançar para agendamento.';
      if (state.scheduled > 0) return 'Conferir a fila agendada e preparar monitoramento dos próximos posts.';
      return 'Atualizar os artefatos do cliente e definir o próximo lote de conteúdo.';
    }

    function buildAssistantResponse(prompt) {
      var state = summarizeState();
      var nextAction = getNextAction(prompt);
      return [
        '<h3>Cliente</h3><p>' + getClientName() + '</p>',
        '<h3>Current state</h3><ul><li>' + state.total + ' ativos de campanha carregados</li><li>' + state.published + ' publicados</li><li>' + state.scheduled + ' agendados</li><li>' + state.review + ' em revisão</li><li>' + state.articles + ' artigos no artefato de campanha</li></ul>',
        '<h3>Next best action</h3><p>' + nextAction + '</p>',
        '<h3>Why this action is the next step</h3><p>O chat opera como terminal da squad: ele lê os artefatos atuais e prioriza o próximo movimento válido, não uma resposta genérica.</p>',
        '<h3>What is needed from the user</h3><p>Informe se deseja atuar em conteúdo, schedule, monitoramento, artigos ou consulta operacional.</p>',
        '<h3>Proposal checkpoint</h3><p class="muted">Quando o ciclo sair de inteligência social e entrar em estratégia, perguntar exatamente: Este ciclo também deve gerar um documento único com a proposta comercial, deck e relatório consolidado?</p>'
      ].join('');
    }

    function getChatApiUrl() {
      if (/^https?:$/.test(window.location.protocol)) return '/api/chat';
      return 'http://localhost:8080/api/chat';
    }

    async function requestAssistantResponse(prompt) {
      try {
        var response = await fetch(getChatApiUrl(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: prompt, history: chatHistory.slice(-8), mode: activeMode })
        });
        if (!response.ok) throw new Error('chat_api_unavailable');
        var payload = await response.json();
        if (payload.mode) {
          activeMode = payload.mode;
          localStorage.setItem('socialGrowthChatMode', activeMode);
        }
        return payload.answerHtml || buildAssistantResponse(prompt);
      } catch (error) {
        return buildAssistantResponse(prompt) + '<p class="muted">Fallback local usado porque a API do chat não respondeu.</p>';
      }
    }

    function appendMessage(role, html) {
      var message = document.createElement('div');
      message.className = 'message ' + role;
      message.innerHTML = '<div class="avatar">' + (role === 'user' ? 'EU' : 'SG') + '</div><div class="bubble">' + html + '</div>';
      messageList.appendChild(message);
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function rememberTurn(role, content) {
      chatHistory.push({ role: role, content: String(content || '').slice(0, 1000), at: new Date().toISOString() });
      chatHistory = chatHistory.slice(-12);
      localStorage.setItem('socialGrowthChatHistory', JSON.stringify(chatHistory));
    }

    function escapeHtml(value) {
      return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    async function submitPrompt(value) {
      var prompt = String(value || '').trim();
      if (!prompt) return;
      appendMessage('user', escapeHtml(prompt));
      rememberTurn('user', prompt);
      promptInput.value = '';
      promptInput.style.height = 'auto';
      var answer = await requestAssistantResponse(prompt);
      appendMessage('assistant', answer);
      rememberTurn('assistant', answer.replace(/<[^>]+>/g, ' '));
    }

    function renderWelcome() {
      appendMessage('assistant', [
        '<h3>Terminal operacional da Social Growth Squad</h3>',
        '<p>Diga o cliente e a intenção. Eu lembro o modo ativo e os últimos turnos nesta sessão.</p>',
        '<div class="starter-grid">',
        '<button class="starter" type="button" data-prompt="AmiClube, qual é o próximo passo do ciclo?">AmiClube, próximo passo</button>',
        '<button class="starter" type="button" data-prompt="AmiClube, verificar artigos do ciclo">Verificar artigos</button>',
        '<button class="starter" type="button" data-prompt="AmiClube, monitoramento dos posts publicados">Monitoramento</button>',
        '</div>'
      ].join(''));
    }

    promptInput.addEventListener('input', function() {
      promptInput.style.height = 'auto';
      promptInput.style.height = Math.min(promptInput.scrollHeight, 160) + 'px';
    });
    promptInput.addEventListener('keydown', function(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        submitPrompt(promptInput.value);
      }
    });
    composerForm.addEventListener('submit', function(event) {
      event.preventDefault();
      submitPrompt(promptInput.value);
    });
    document.addEventListener('click', function(event) {
      var starter = event.target.closest('[data-prompt]');
      if (!starter) return;
      submitPrompt(starter.getAttribute('data-prompt'));
    });

    renderWelcome();
  </script>
</body>
</html>

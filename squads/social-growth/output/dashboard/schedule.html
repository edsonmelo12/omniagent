<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule - Social Growth Squad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0C5CAB; --secondary: #0A4A8A; --success: #10B981; --warning: #F59E0B; --danger: #EF4444; --surface: #09090B; --surface-elevated: #121216; --text: #FAFAFA; --text-muted: #A1A1AA; --border: rgba(255, 255, 255, 0.08); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; display: flex; }
    .sidebar { width: 240px; background: var(--surface-elevated); border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; position: fixed; height: 100vh; }
    .sidebar-logo { display: flex; align-items: center; gap: 12px; padding: 0 8px 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .sidebar-logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    .sidebar-logo-text { font-weight: 600; font-size: 16px; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.15s ease; }
    .nav-item:hover { background: rgba(255, 255, 255, 0.04); color: var(--text); }
    .nav-item.active { background: var(--primary); color: white; }
    .nav-icon { width: 20px; height: 20px; opacity: 0.8; }
    .main { flex: 1; margin-left: 240px; padding: 24px 32px; background: var(--surface); min-height: 100vh; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .header-title { font-size: 24px; font-weight: 600; }
    .header-filters { display: flex; gap: 16px; align-items: center; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 500; }
    .filter-select { background: var(--surface-elevated); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; color: var(--text); font-size: 14px; font-family: inherit; min-width: 160px; cursor: pointer; }
    .card { background: var(--surface-elevated); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .calendar-day { aspect-ratio: 1; border: 1px solid var(--border); border-radius: 8px; padding: 8px; display: flex; flex-direction: column; min-height: 80px; }
    .calendar-day.today { border-color: var(--primary); background: rgba(12, 92, 171, 0.1); }
    .calendar-day.has-items { background: rgba(255, 255, 255, 0.02); }
    .calendar-day-number { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
    .calendar-day.today .calendar-day-number { color: var(--primary); }
    .calendar-event { font-size: 10px; padding: 2px 4px; border-radius: 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .calendar-event.instagram { background: rgba(225, 48, 108, 0.2); color: #E1306C; }
    .calendar-event.facebook { background: rgba(24, 119, 242, 0.2); color: #1877F2; }
    .schedule-table { width: 100%; border-collapse: collapse; }
    .schedule-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 600; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .schedule-table td { padding: 16px; font-size: 14px; border-bottom: 1px solid var(--border); }
    .schedule-table tr:last-child td { border-bottom: none; }
    .channel-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; }
    .channel-badge.instagram { background: rgba(225, 48, 108, 0.15); color: #E1306C; }
    .channel-badge.facebook { background: rgba(24, 119, 242, 0.15); color: #1877F2; }
    .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .status-pill.scheduled { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .status-pill.published { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .status-pill.preview_ready { background: rgba(12, 92, 171, 0.15); color: var(--primary); }
    .status-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .upcoming-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .upcoming-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; transition: transform 0.2s ease; }
    .upcoming-card:hover { transform: translateY(-2px); }
    .upcoming-date { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .upcoming-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .empty-state { text-align: center; padding: 48px; color: var(--text-muted); }
    .metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
    .metric-card { background: var(--surface-elevated); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .metric-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .metric-value { font-size: 28px; font-weight: 700; }
    @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; padding: 16px; } .calendar-grid { grid-template-columns: repeat(2, 1fr); } .upcoming-grid { grid-template-columns: 1fr; } .metrics-row { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">SG</div>
      <span class="sidebar-logo-text">Social Growth</span>
    </div>
    <nav class="sidebar-nav">
      <a href="chat.html" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h8M8 14h5m8-2c0 4.418-4.03 8-9 8a9.98 9.98 0 01-3-.45L3 20l1.43-3.73A7.97 7.97 0 013 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
        Chat da squad
      </a>
      <a href="index.html" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
        Overview
      </a>
      <a href="campaigns.html" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>
        Campaigns
      </a>
      <a href="articles.html" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 6h13M8 12h13M8 18h13M4 6h.01M4 12h.01M4 18h.01"></path></svg>
        Artigo
      </a>
      <a href="schedule.html" class="nav-item active">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        Schedule
      </a>
      <a href="monitor.html" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
        Monitor
      </a>
      <a href="analytics.html" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
        Analytics
      </a>
      <a href="products.html" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7H4a1 1 0 00-1 1v8a1 1 0 001 1h16a1 1 0 001-1V8a1 1 0 00-1-1zm-4 0V5a2 2 0 10-4 0v2m-4 0V5a2 2 0 114 0v2"></path></svg>
        Produtos
      </a>
      <a href="settings.html" class="nav-item" style="margin-top: auto;">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        Settings
      </a>
    </nav>
  </aside>

  <main class="main">
    <header class="header">
      <h1 class="header-title">Schedule</h1>
      <div class="header-filters">
        <div class="filter-group">
          <label class="filter-label">Cliente</label>
          <select class="filter-select">
            <option value="amiclube">AmiClube</option>
          </select>
        </div>
      </div>
    </header>

    <div class="metrics-row">
      <div class="metric-card">
        <div class="metric-title">Agendados</div>
        <div class="metric-value" id="scheduledCount">-</div>
      </div>
      <div class="metric-card">
        <div class="metric-title">Publicados</div>
        <div class="metric-value" id="publishedCount">-</div>
      </div>
      <div class="metric-card">
        <div class="metric-title">Próximos 7 dias</div>
        <div class="metric-value" id="next7Days">-</div>
      </div>
      <div class="metric-card">
        <div class="metric-title">Este Mês</div>
        <div class="metric-value" id="thisMonth">-</div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">Próximos Eventos</h2>
      <div class="upcoming-grid" id="upcomingGrid">
        <div class="empty-state">Carregando...</div>
      </div>
    </div>

    <div class="card" style="padding: 0; overflow: hidden;">
      <h2 class="section-title" style="padding: 24px 24px 0;">Fila Completa</h2>
      <table class="schedule-table">
        <thead>
          <tr>
            <th>Ativo</th>
            <th>Canal</th>
            <th>Data Agendada</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="scheduleTableBody">
          <tr><td colspan="4" class="empty-state">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="data.js"></script>
  <script>
    function loadData() {
      return window.__DASHBOARD_DATA__ || { queue: [], metrics: {}, blogsScheduled: 0 };
    }

    function renderSchedule() {
      const data = loadData();
      const queue = Array.isArray(data.queue) ? data.queue : [];
      const scheduled = queue.filter(q => q.status === 'scheduled');
      const published = queue.filter(q => q.status === 'published' || q.status === 'Aprovado');

      document.getElementById('scheduledCount').textContent = scheduled.length;
      document.getElementById('publishedCount').textContent = published.length;
      document.getElementById('next7Days').textContent = scheduled.length;
      document.getElementById('thisMonth').textContent = data.blogsScheduled || 0;

      const upcomingGrid = document.getElementById('upcomingGrid');
      if (scheduled.length > 0) {
        upcomingGrid.innerHTML = scheduled.slice(0, 6).map(item => `
          <div class="upcoming-card">
            <div class="upcoming-date">${item.publish_at}</div>
            <div class="upcoming-title">${item.asset_id}</div>
            <span class="channel-badge ${item.channel}">${item.channel}</span>
          </div>
        `).join('');
      } else {
        upcomingGrid.innerHTML = '<div class="empty-state">Nenhum evento agendado</div>';
      }

      const tableBody = document.getElementById('scheduleTableBody');
      if (queue.length > 0) {
        tableBody.innerHTML = queue.map(item => `
          <tr>
            <td><strong>${item.asset_id}</strong></td>
            <td><span class="channel-badge ${item.channel}">${item.channel}</span></td>
            <td>${item.publish_at}</td>
            <td><span class="status-pill ${item.status}">${item.status === 'published' || item.status === 'Aprovado' ? 'Publicado' : item.status === 'scheduled' ? 'Agendado' : item.status}</span></td>
          </tr>
        `).join('');
      } else {
        tableBody.innerHTML = '<tr><td colspan="4" class="empty-state">Nenhum item na fila</td></tr>';
      }
    }

    renderSchedule();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campaigns - Social Growth Squad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0C5CAB; --secondary: #0A4A8A; --success: #10B981; --warning: #F59E0B; --danger: #EF4444; --surface: #09090B; --surface-elevated: #121216; --text: #FAFAFA; --text-muted: #A1A1AA; --border: rgba(255, 255, 255, 0.08); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; display: flex; }
    .sidebar { width: 240px; background: var(--surface-elevated); border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; position: fixed; height: 100vh; }
    .sidebar-logo { display: flex; align-items: center; gap: 12px; padding: 0 8px 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .sidebar-logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    .sidebar-logo-text { font-weight: 600; font-size: 16px; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.15s ease; }
    .nav-item:hover { background: rgba(255, 255, 255, 0.04); color: var(--text); }
    .nav-item.active { background: var(--primary); color: white; }
    .nav-icon { width: 20px; height: 20px; opacity: 0.8; }
    .main { flex: 1; margin-left: 240px; padding: 24px 32px; background: var(--surface); min-height: 100vh; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .header-title { font-size: 24px; font-weight: 600; }
    .campaigns-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .campaign-card { background: var(--surface-elevated); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .campaign-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3); }
    .campaign-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .campaign-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .campaign-id { font-size: 12px; color: var(--text-muted); }
    .campaign-progress { margin: 16px 0; }
    .progress-bar { height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease; }
    .progress-fill.published { background: var(--success); }
    .progress-fill.scheduled { background: var(--warning); }
    .progress-fill.draft { background: var(--text-muted); }
    .progress-text { font-size: 12px; color: var(--text-muted); }
    .campaign-meta { display: flex; flex-wrap: wrap; gap: 8px; }
    .meta-tag { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; }
    .meta-tag.channel { background: rgba(225, 48, 108, 0.15); color: #E1306C; }
    .meta-tag.blog { background: rgba(12, 92, 171, 0.15); color: var(--primary); }
    .meta-tag.priority-p1 { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
    .meta-tag.priority-p2 { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .meta-tag.status { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .campaign-actions { display: flex; gap: 8px; margin-top: 16px; }
    .post-link { display: inline-flex; align-items: center; justify-content: center; padding: 8px 12px; border-radius: 8px; background: rgba(12, 92, 171, 0.14); color: #7cc2ff; text-decoration: none; font-size: 12px; font-weight: 600; cursor: pointer; }
    .post-link:hover { background: rgba(12, 92, 171, 0.22); }
    .post-link.secondary { background: rgba(255, 255, 255, 0.06); color: var(--text); }
    .post-link.secondary:hover { background: rgba(255, 255, 255, 0.1); }
    .post-modal-backdrop { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.72); display: none; align-items: stretch; justify-content: stretch; padding: 0; z-index: 50; }
    .post-modal-backdrop.open { display: flex; }
    .post-modal { width: 100vw; height: 100vh; overflow: auto; background: var(--surface-elevated); border: 0; border-radius: 0; box-shadow: none; }
    .post-modal-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; padding: 20px 22px; border-bottom: 1px solid var(--border); }
    .post-modal-title { font-size: 20px; font-weight: 700; }
    .post-modal-subtitle { margin-top: 4px; color: var(--text-muted); font-size: 13px; }
    .post-modal-close { border: 0; background: transparent; color: var(--text-muted); font-size: 28px; line-height: 1; cursor: pointer; }
    .post-modal-body { display: grid; grid-template-columns: 0.82fr 1.18fr; gap: 20px; padding: 22px; min-height: calc(100vh - 70px); }
    .post-modal-panel { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .post-modal-panel h4 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted); margin-bottom: 12px; }
    .post-modal-caption { white-space: pre-wrap; line-height: 1.6; font-size: 14px; }
    .post-modal-hashtags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .post-modal-hashtag { padding: 5px 10px; border-radius: 999px; background: rgba(255,255,255,0.06); color: var(--text); font-size: 12px; }
    .post-modal-source { color: var(--text-muted); font-size: 12px; margin-top: 10px; }
    .post-modal-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    .post-modal-images { display: grid; grid-template-columns: repeat(var(--post-image-columns, 3), minmax(0, 1fr)); gap: 12px; align-content: start; }
    .post-modal-image { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #0f0f13; }
    .post-modal-image img { width: 100%; display: block; height: auto; }
    .post-modal-image-label { padding: 10px 12px; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border); }
    .meta-tag.format { background: rgba(12, 92, 171, 0.15); color: #8dc6ff; }
    .meta-tag.date { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    @media (max-width: 900px) {
      .post-modal-body { grid-template-columns: 1fr; min-height: auto; }
      .post-modal-images { grid-template-columns: 1fr; }
    }
    .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .status-pill.published { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .status-pill.scheduled { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .status-pill.draft { background: rgba(161, 161, 171, 0.15); color: var(--text-muted); }
    .status-pill.review { background: rgba(12, 92, 171, 0.15); color: var(--primary); }
    .status-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    .metric-card { background: var(--surface-elevated); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .metric-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .metric-value { font-size: 28px; font-weight: 700; }
    .filters-bar { display: grid; grid-template-columns: 1.2fr repeat(3, minmax(0, 1fr)); gap: 12px; margin-bottom: 22px; }
    .filter-field { display: flex; flex-direction: column; gap: 8px; background: var(--surface-elevated); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .filter-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
    .filter-input, .filter-select { width: 100%; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); color: var(--text); border-radius: 10px; padding: 10px 12px; font: inherit; }
    .filter-select { color-scheme: dark; background-color: #1a1a21; }
    .filter-select option { background: #1a1a21; color: var(--text); }
    .filter-input::placeholder { color: var(--text-muted); }
    .filter-input:focus, .filter-select:focus { outline: none; border-color: rgba(124, 194, 255, 0.65); box-shadow: 0 0 0 3px rgba(12, 92, 171, 0.2); }
    .empty-state { text-align: center; padding: 48px; color: var(--text-muted); grid-column: 1 / -1; }
    @media (max-width: 1200px) { .campaigns-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 900px) { .filters-bar { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; padding: 16px; } .campaigns-grid { grid-template-columns: 1fr; } .metrics-row { grid-template-columns: repeat(2, 1fr); } .filters-bar { grid-template-columns: 1fr; } }
  </style>

<script src="data.js"></script>
<script>
    var currentClient = 'amiclube';
    var campaignItems = [];
    var filterState = {
      search: '',
      status: 'all',
      type: 'all',
      network: 'all'
    };

    function loadData() {
      return window.__DASHBOARD_DATA__ || {};
    }

    function resolveAssetUrl(item) {
      return item.publishedUrl || item.published_url || item.linkTarget || item.canonicalPreviewHtml || item.reviewModalHtml || '#';
    }

    function parseCampaignDate(item) {
      var raw = item.publish_at_iso || item.publish_at || item.publishedAt || item.published_at || item.targetDate || '';
      if (!raw) return null;

      var value = String(raw).trim();
      var isoMatch = value.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (isoMatch) {
        return new Date(Number(isoMatch[1]), Number(isoMatch[2]) - 1, Number(isoMatch[3]));
      }

      var brMatch = value.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      if (brMatch) {
        return new Date(Number(brMatch[3]), Number(brMatch[2]) - 1, Number(brMatch[1]));
      }

      var parsed = new Date(value);
      return isNaN(parsed.getTime()) ? null : parsed;
    }

    function formatCampaignDate(item) {
      var date = parseCampaignDate(item);
      if (!date) return item.publish_at || item.publishedAt || item.published_at || item.targetDate || '-';
      var day = String(date.getDate()).padStart(2, '0');
      var month = String(date.getMonth() + 1).padStart(2, '0');
      var year = String(date.getFullYear());
      return day + '/' + month + '/' + year;
    }

    function capitalizeType(type) {
      var value = String(type || '').trim();
      if (!value) return '-';
      return value.charAt(0).toUpperCase() + value.slice(1).toLowerCase();
    }

    function normalize(value) {
      return String(value || '').trim().toLowerCase();
    }

    function getStatusBucket(status) {
      var value = normalize(status);
      if (value === 'aprovado' || value === 'published') return 'published';
      if (value === 'agendado' || value === 'scheduled') return 'scheduled';
      if (value === 'em revisão' || value === 'em revisão (preview pronto)' || value === 'review') return 'review';
      return 'draft';
    }

    function statusLabel(bucket) {
      if (bucket === 'published') return 'Publicado';
      if (bucket === 'scheduled') return 'Agendado';
      if (bucket === 'review') return 'Em revisão';
      return 'Rascunho';
    }

    function uniqueValues(items, getter) {
      var seen = {};
      var values = [];
      for (var i = 0; i < items.length; i++) {
        var value = getter(items[i]);
        if (!value) continue;
        var key = normalize(value);
        if (seen[key]) continue;
        seen[key] = true;
        values.push(value);
      }
      return values;
    }

    function buildFilterOptions(campaigns) {
      var statusSelect = document.getElementById('statusFilter');
      var typeSelect = document.getElementById('typeFilter');
      var networkSelect = document.getElementById('networkFilter');

      var statuses = ['published', 'scheduled', 'review', 'draft'];
      var types = uniqueValues(campaigns, function(item) { return item.type || ''; });
      var networks = uniqueValues(campaigns, function(item) { return item.channel || ''; });

      statusSelect.innerHTML = '<option value="all">Todos os status</option>' + statuses.map(function(bucket) {
        return '<option value="' + bucket + '">' + statusLabel(bucket) + '</option>';
      }).join('');
      typeSelect.innerHTML = '<option value="all">Todos os tipos</option>' + types.map(function(type) {
        return '<option value="' + normalize(type) + '">' + capitalizeType(type) + '</option>';
      }).join('');
      networkSelect.innerHTML = '<option value="all">Todas as redes</option>' + networks.map(function(network) {
        return '<option value="' + normalize(network) + '">' + network + '</option>';
      }).join('');
    }

    function matchesFilters(item) {
      var search = normalize(filterState.search);
      var status = normalize(filterState.status);
      var type = normalize(filterState.type);
      var network = normalize(filterState.network);
      var title = normalize(item.title || item.plannedTitle);
      var assetId = normalize(item.assetId || item.asset_id || item.id);
      var objective = normalize(item.objective);
      var itemType = normalize(item.type);
      var itemNetwork = normalize(item.channel);
      var itemStatus = getStatusBucket(item.status);

      if (search) {
        var haystack = [title, assetId, objective, itemType, itemNetwork].join(' ');
        if (haystack.indexOf(search) === -1) return false;
      }
      if (status !== 'all' && itemStatus !== status) return false;
      if (type !== 'all' && itemType !== type) return false;
      if (network !== 'all' && itemNetwork !== network) return false;
      return true;
    }

    function getCampaignItems(data) {
      if (data && data.campaigns && Array.isArray(data.campaigns.items) && data.campaigns.items.length) {
        return data.campaigns.items;
      }
      if (Array.isArray(data.items) && data.items.length) {
        return data.items;
      }
      if (Array.isArray(data.queue) && data.queue.length) {
        return data.queue;
      }
      return [];
    }

    function getStatusLabel(status) {
      var normalized = String(status || '').toLowerCase();
      if (normalized === 'review' || normalized === 'em revisão' || normalized === 'em revisão (preview pronto)') return 'review';
      if (normalized === 'published' || normalized === 'aprovado') return 'published';
      if (normalized === 'scheduled' || normalized === 'agendado') return 'scheduled';
      if (normalized === 'blocked' || normalized === 'rascunho') return 'draft';
      if (status === 'Em revisão' || status === 'Em revisão (preview pronto)') return 'review';
      if (status === 'Aprovado') return 'published';
      if (status === 'Agendado') return 'scheduled';
      if (status === 'Rascunho') return 'draft';
      return 'draft';
    }

    function renderCampaigns(client) {
      var data = loadData();
      var campaigns = getCampaignItems(data);
      campaignItems = campaigns;
      var container = document.getElementById('campaignsGrid');
      
      if (campaigns.length === 0) {
        container.innerHTML = '<div class="empty-state">Nenhuma campanha encontrada</div>';
        return;
      }
      
      var filteredCampaigns = campaigns.filter(matchesFilters).slice().sort(function(a, b) {
        var dateA = parseCampaignDate(a);
        var dateB = parseCampaignDate(b);
        if (!dateA && !dateB) return 0;
        if (!dateA) return 1;
        if (!dateB) return -1;
        return dateA - dateB;
      });
      var html = '';
      for (var i = 0; i < filteredCampaigns.length; i++) {
        var c = filteredCampaigns[i];
        var statusClass = getStatusLabel(c.status);
        var priorityClass = 'priority-' + ((c.priority || 'P2').toLowerCase());
        var title = c.title || c.plannedTitle || c.assetId || c.asset_id || 'Campanha';
        var targetDate = formatCampaignDate(c);
        var formatLabel = (c.channel || '-') + ' - ' + capitalizeType(c.type);
        var isScheduled = String(c.status || '').toLowerCase() === 'scheduled' || String(c.status || '').toLowerCase() === 'agendado';
        
        html += '<div class="campaign-card">' +
          '<div class="campaign-header">' +
            '<div>' +
              '<div class="campaign-title">' + (title.length > 45 ? title.substring(0, 45) + '...' : title) + '</div>' +
              '<div class="campaign-id">' + (c.asset_id || c.id || '-') + '</div>' +
            '</div>' +
            '<span class="status-pill ' + statusClass + '">' + (c.status || '-') + '</span>' +
          '</div>' +
          '<div class="campaign-progress">' +
            '<div class="progress-bar"><div class="progress-fill ' + statusClass + '" style="width:70%"></div></div>' +
            '<div class="progress-text">70% • ' + (isScheduled && targetDate !== '-' ? 'Previsão: ' + targetDate : 'Meta: ' + targetDate) + '</div>' +
          '</div>' +
          '<div class="campaign-meta">' +
            '<span class="meta-tag format">' + formatLabel + '</span>' +
            '<span class="meta-tag ' + priorityClass + '">' + (c.priority || 'P2') + '</span>' +
            (isScheduled && targetDate !== '-' ? '<span class="meta-tag date">Previsão ' + targetDate + '</span>' : '') +
          '</div>' +
          '<div class="campaign-actions">' +
            '<a class="post-link" href="#" data-post-asset="' + (c.assetId || c.asset_id || c.id || '') + '">post</a>' +
            '<a class="post-link secondary" href="' + resolveAssetUrl(c) + '" target="_blank" rel="noreferrer">abrir</a>' +
          '</div>' +
        '</div>';
      }
      container.innerHTML = html;
      
      var total = campaigns.length;
      var blogs = campaigns.filter(function(c) { return (c.channel || '').toLowerCase() === 'blog'; }).length;
      var social = campaigns.length - blogs;
      var published = campaigns.filter(function(c) { return getStatusBucket(c.status) === 'published'; }).length;
      
      document.getElementById('totalAssets').textContent = total;
      document.getElementById('blogCount').textContent = blogs;
      document.getElementById('socialCount').textContent = social;
      document.getElementById('publishedCount').textContent = published;

      container.innerHTML = html || '<div class="empty-state">Nenhuma campanha corresponde aos filtros</div>';
    }

    function openPostModal(item) {
      if (!item) return;
      document.getElementById('postModalTitle').textContent = item.title || item.assetId || 'Post';
      document.getElementById('postModalSubtitle').textContent = [item.assetId || item.asset_id, item.channel, item.objective].filter(Boolean).join(' • ');
      document.getElementById('postModalCaption').textContent = item.caption || 'Legenda não disponível.';
      document.getElementById('postModalUrl').setAttribute('href', resolveAssetUrl(item));

      var hashtagsEl = document.getElementById('postModalHashtags');
      var hashtags = Array.isArray(item.hashtags) ? item.hashtags : [];
      hashtagsEl.innerHTML = hashtags.length ? hashtags.map(function(tag) { return '<span class="post-modal-hashtag">' + tag + '</span>'; }).join('') : '<span class="post-modal-hashtag">Sem hashtags</span>';

      document.getElementById('postModalSource').textContent = 'Fonte: ' + (item.previewManifestFile || item.reviewModalFile || item.canonicalPreviewHtml || 'data.js');

      var imagesEl = document.getElementById('postModalImages');
      var images = Array.isArray(item.exportedImages) ? item.exportedImages : [];
      imagesEl.style.setProperty('--post-image-columns', String(Math.min(3, Math.max(1, images.length || 1))));
      if (images.length) {
        imagesEl.innerHTML = images.map(function(src, index) {
          var label = 'Imagem ' + String(index + 1).padStart(2, '0');
          return '<figure class="post-modal-image"><img src="' + src + '" alt="' + label + '" loading="lazy" /><figcaption class="post-modal-image-label">' + label + '</figcaption></figure>';
        }).join('');
      } else {
        imagesEl.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1; padding: 20px;">Nenhuma imagem vinculada.</div>';
      }

      var backdrop = document.getElementById('postModalBackdrop');
      backdrop.classList.add('open');
      backdrop.setAttribute('aria-hidden', 'false');
    }

    function closePostModal() {
      var backdrop = document.getElementById('postModalBackdrop');
      backdrop.classList.remove('open');
      backdrop.setAttribute('aria-hidden', 'true');
    }

    document.getElementById('postModalClose').addEventListener('click', closePostModal);
    document.getElementById('postModalBackdrop').addEventListener('click', function(event) {
      if (event.target === this) closePostModal();
    });
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') closePostModal();
    });
    document.addEventListener('click', function(event) {
      var trigger = event.target.closest('[data-post-asset]');
      if (!trigger) return;
      event.preventDefault();
      var assetId = String(trigger.getAttribute('data-post-asset') || '').toUpperCase();
      var item = campaignItems.find(function(entry) {
        return String(entry.assetId || entry.asset_id || entry.id || '').toUpperCase() === assetId;
      });
      openPostModal(item);
    });

    document.getElementById('searchFilter').addEventListener('input', function(event) {
      filterState.search = event.target.value || '';
      renderCampaigns(currentClient);
    });
    document.getElementById('statusFilter').addEventListener('change', function(event) {
      filterState.status = event.target.value || 'all';
      renderCampaigns(currentClient);
    });
    document.getElementById('typeFilter').addEventListener('change', function(event) {
      filterState.type = event.target.value || 'all';
      renderCampaigns(currentClient);
    });
    document.getElementById('networkFilter').addEventListener('change', function(event) {
      filterState.network = event.target.value || 'all';
      renderCampaigns(currentClient);
    });

    buildFilterOptions(getCampaignItems(loadData()));
    renderCampaigns(currentClient);
  </script>
</body>
</html>

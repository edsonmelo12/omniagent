<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AC-30-12 | Atendimento previsível como diferencial competitivo · AmiClube</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Inter:wght@400;700;800&family=Playfair+Display:wght@800&display=swap');
    :root {
      --ink: #241d18;
      --paper: #f8f3ec;
      --line: #e4d9cc;
      --teal: #299d8f;
      --coral: #dc4c5d;
      --blue: #234555;
      --dark: #1d1511;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(circle at top left, #fff 0%, #efe5d8 48%, #e6d8c9 100%);
      padding: 18px;
      font-family: "DM Sans", "Inter", "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .shield {
      width: min(1200px, 100%);
      background: rgba(15, 17, 20, .96);
      color: #e5e7eb;
      border: 1px solid #2a2320;
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 18px 36px rgba(18, 12, 9, .18);
    }
    .shield-row {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px 14px;
    }
    .shield-col { min-width: 0; }
    .shield-label {
      font-size: 9px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: #8b8b8b;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .shield-value {
      font-size: 12px;
      line-height: 1.35;
      font-weight: 700;
      color: #fff;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
      color: #fff;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }
    .card-container {
      width: min(960px, calc(100vw - 40px));
      aspect-ratio: 1200 / 630;
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid rgba(36, 29, 24, .12);
      box-shadow: 0 26px 55px rgba(33, 22, 17, .18);
      background: #231812;
    }
    body.export-mode .card-container {
      width: 1200px;
      height: 630px;
    }
    .bg-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    @media (max-width: 1240px) {
      body { padding: 14px; }
      .card-container { width: min(960px, calc(100vw - 40px)); }
    }
  </style>
</head>
<body>
  <div class="card-container">
    <img class="bg-image" src="../../ai-studio/AC-30-09B/0. AC-30-09B.png" alt="Segurança em amigurumi artesanal: 7 perguntas antes de comprar." />
  </div>
</body>
</html>

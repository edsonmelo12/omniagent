<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>7 perguntas que mostram se um amigurumi artesanal é confiável · AmiClube</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700;800&family=Playfair+Display:wght@700;800&display=swap');
    :root {
  --ds-preview-w: 420px;
  --ds-preview-h: 525px;
  --ds-export-w: 1080px;
  --ds-export-h: 1350px;
  --ds-scale: 2.5714285714;

  --ds-space-1: 8px;
  --ds-space-2: 16px;
  --ds-space-3: 24px;
  --ds-space-4: 32px;
  --ds-space-5: 40px;
  --ds-space-6: 48px;
  --ds-space-7: 56px;
  --ds-space-8: 64px;

  --ds-radius-sm: 10px;
  --ds-radius-md: 16px;
  --ds-radius-lg: 24px;
  --ds-shadow-soft: 0 18px 50px rgba(0, 0, 0, 0.22);
  --ds-shadow-text: 0 3px 16px rgba(0, 0, 0, 0.28);

  --ds-font-hero: 34px;
  --ds-font-heading: 26px;
  --ds-font-body: 15px;
  --ds-font-caption: 10px;
  --ds-export-font-hero: 78px;
  --ds-export-font-heading: 58px;
  --ds-export-font-body: 34px;
  --ds-export-font-caption: 24px;

  --ds-content-pad-x: 36px;
  --ds-export-content-pad-x: 80px;
}

    :root {
  --style-name: "dark-premium";
  --style-bg: #0d0d0d;
  --style-bg-alt: #171717;
  --style-surface: rgba(255, 255, 255, 0.07);
  --style-surface-strong: rgba(255, 255, 255, 0.12);
  --style-text-heading: #f5f0df;
  --style-text-body: #d7d2c2;
  --style-text-muted: #a9a28f;
  --style-accent: #d4af37;
  --style-accent-soft: rgba(212, 175, 55, 0.18);
  --style-border: rgba(212, 175, 55, 0.34);
  --style-heading-font: "Playfair Display", Georgia, serif;
  --style-body-font: "DM Sans", Arial, sans-serif;
  --style-noise-opacity: 0.045;
  --style-vignette-opacity: 0.64;
  --style-gradient: radial-gradient(circle at 22% 12%, rgba(212, 175, 55, 0.2), transparent 34%), linear-gradient(145deg, #0d0d0d 0%, #171717 52%, #080808 100%);
}

:root {
  --style-accent: #8FB8A8;
  --style-text-heading: #FFFFFF;
  --style-text-body: rgba(255,255,255,0.85);
  --style-text-muted: rgba(255,255,255,0.5);
  --style-heading-font: "Poppins";
  --style-body-font: "Nunito";
  --style-noise-opacity: 0.03;
}

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; flex-direction: column;
      align-items: center; min-height: 100vh;
      font-family: var(--style-body-font);
      color: var(--style-text-body);
      padding: 40px;
      background: #e9e7e2;
    }

    .fb-frame {
      width: 600px;
      height: 315px;
      position: relative;
      overflow: hidden;
      border-radius: 0;
      background: var(--style-gradient);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.12);
    }

    .bg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      z-index: 0;
      object-fit: cover; object-position: center;
      
    }

    .overlay {
      position: absolute; inset: 0;
      z-index: 1;
      background: rgba(0,0,0,0.45);
    }

    .slide {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      background: transparent;
      padding: 32px 48px;
    }

    .slide::before {
      content: "";
      position: absolute; inset: 0; z-index: 3;
      opacity: var(--style-noise-opacity);
      background-image:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,0.9) 0 1px, transparent 1px),
        radial-gradient(circle at 75% 54%, rgba(255,255,255,0.72) 0 1px, transparent 1px);
      background-size: 13px 13px, 19px 19px;
      pointer-events: none;
    }

    .slide::after {
      content: "";
      position: absolute; inset: 0; z-index: 2;
      background: radial-gradient(circle at center, transparent 28%, rgba(0,0,0,var(--style-vignette-opacity)) 100%);
      pointer-events: none;
    }

    .brand-mark {
      position: absolute; top: 16px; left: 24px; z-index: 5;
      display: flex; align-items: center; gap: 8px;
      color: var(--style-text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-size: 9px;
      font-weight: 800;
    }

    .brand-mark .dot {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--style-accent);
    }

    .content-creative {
      position: relative; z-index: 4;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      text-align: center;
      max-width: 500px;
    }

    .eyebrow {
      display: inline-flex; align-items: center; width: fit-content;
      color: var(--style-accent);
      background: var(--style-accent-soft);
      border: 1px solid var(--style-border);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .title {
      color: var(--style-text-heading);
      font-family: var(--style-heading-font);
      font-size: 24px;
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.3px;
    }

    .body-text {
      color: var(--style-text-body);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
      max-width: 440px;
    }

    .divider {
      width: 50px; height: 2px;
      background: var(--style-accent);
    }

    .cta-block {
      margin-top: 2px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--style-border);
      color: var(--style-text-heading);
      background: linear-gradient(135deg, var(--style-accent-soft), rgba(255,255,255,0.04));
      font-size: 10px;
      font-weight: 800;
    }

    .footer-note {
      position: absolute; bottom: 14px; right: 24px; z-index: 5;
      color: var(--style-text-muted);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.5;
    }

    body.export-mode {
      background: var(--style-bg);
      padding: 0;
    }

    body.export-mode .fb-frame {
      width: 1200px; height: 630px;
      border-radius: 0; box-shadow: none;
    }

    body.export-mode .slide {
      width: 1200px; height: 630px;
      padding: 80px 120px;
    }

    body.export-mode .brand-mark,
    body.export-mode .footer-note { display: none !important; }

    body.export-mode .title { font-size: 52px; }
    body.export-mode .body-text { max-width: 920px; font-size: 26px; }
    body.export-mode .eyebrow { font-size: 18px; padding: 12px 24px; }
    body.export-mode .divider { width: 120px; height: 4px; }
    body.export-mode .cta-block { padding: 16px 30px; font-size: 22px; }
    body.export-mode .content-creative { gap: 20px; max-width: 960px; }
  </style>
</head>
<body>
  <div class="fb-frame">
    <div class="slide" data-text-variant="light">
      <img class="bg" src="../../ai-studio/AC-30-09B/3. AC-30-33 — Facebook Post (1200x630px).png" alt="Compromisso de Segurança Artesanal: cada peça passa por 3 verificações obrigatórias." />
    </div>
  </div>
</body>
</html>

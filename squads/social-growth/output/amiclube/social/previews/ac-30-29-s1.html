    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      background: #111;
      color: var(--style-text-body);
      font-family: var(--style-body-font);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .stories-frame {
      width: 360px;
      height: 640px;
      background: #000;
      border-radius: 18px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      position: relative;
    }

    .stories-viewport {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      background: var(--style-bg);
    }

    .stories-track {
      height: 100%;
      display: flex;
      flex-direction: column;
      transform: translateY(0);
      transition: transform 260ms ease;
    }

    .frame {
      min-height: 100%;
      height: 640px;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      isolation: isolate;
      background: var(--style-gradient);
      color: var(--style-text-body);
      padding: 56px 24px 70px;
    }

    .frame::before {
      content: "";
      position: absolute; inset: 0; z-index: 0;
      opacity: var(--style-noise-opacity);
      background-image:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,0.9) 0 1px, transparent 1px),
        radial-gradient(circle at 75% 54%, rgba(255,255,255,0.72) 0 1px, transparent 1px);
      background-size: 13px 13px, 19px 19px;
      pointer-events: none;
    }

    .frame::after {
      content: "";
      position: absolute; inset: 0; z-index: 0;
      background: radial-gradient(circle at center, transparent 28%, rgba(0,0,0,var(--style-vignette-opacity)) 100%);
      pointer-events: none;
    }

    .brand-mark {
      position: absolute; top: 16px; left: 16px; z-index: 3;
      color: var(--style-accent);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .content-creative {
      position: relative; z-index: 2;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 10px;
      text-align: left;
    }

    .content-creative.center { align-items: center; text-align: center; }

    .eyebrow {
      display: inline-flex; align-items: center; width: fit-content;
      color: var(--style-accent);
      background: var(--style-accent-soft);
      border: 1px solid var(--style-border);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .title {
      color: var(--style-text-heading);
      font-family: var(--style-heading-font);
      font-size: 22px;
      font-weight: 800;
      line-height: 1.05;
    }

    .body-text {
      max-width: 280px;
      color: var(--style-text-body);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.4;
    }

    .cta-block {
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--style-border);
      color: var(--style-text-heading);
      background: linear-gradient(135deg, var(--style-accent-soft), rgba(255,255,255,0.04));
      font-size: 9px;
      font-weight: 800;
    }

    .choice-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      width: 100%;
      justify-content: center;
      margin-top: 4px;
    }

    .choice-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--style-border);
      background: rgba(255, 255, 255, 0.72);
      color: var(--style-text-heading);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.04em;
      min-width: 88px;
    }

    .choice-pill.primary {
      background: linear-gradient(135deg, var(--style-accent-soft), rgba(255,255,255,0.08));
    }

    .stories-progress {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; gap: 4px;
      padding: 8px 12px;
    }

    .stories-progress .seg {
      flex: 1; height: 3px;
      background: rgba(255,255,255,0.20);
      border-radius: 2px;
      overflow: hidden;
    }

    .stories-progress .seg.active { background: rgba(255,255,255,0.85); }

    .nav-overlay {
      position: absolute; top: 0; bottom: 0; width: 40%;
      z-index: 10; cursor: pointer;
    }

    .nav-overlay.prev { left: 0; }
    .nav-overlay.next { right: 0; }

    body.export-mode {
      width: 1080px; height: 1920px;
      min-height: auto; overflow: hidden;
      padding: 0; background: #000;
      display: block;
    }

    body.export-mode .stories-frame {
      width: 1080px; height: 1920px;
      border-radius: 0; box-shadow: none;
    }

    body.export-mode .stories-viewport {
      width: 1080px; height: 1920px;
    }

    body.export-mode .stories-track {
      width: max-content;
      height: 1920px;
      transition: none !important;
    }

    body.export-mode .frame {
      width: 1080px; min-width: 1080px; max-width: 1080px;
      min-height: 1920px; height: 1920px; max-height: 1920px;
      padding: 140px 60px 160px;
      overflow: hidden;
    }

    body.export-mode .stories-progress,
    body.export-mode .nav-overlay,
    body.export-mode .brand-mark { display: none !important; }

    body.export-mode .title { font-size: 56px; }
    body.export-mode .body-text { max-width: 840px; font-size: 28px; }
    body.export-mode .eyebrow { font-size: 20px; padding: 10px 20px; }
    body.export-mode .cta-block { padding: 18px 28px; font-size: 22px; }
    body.export-mode .choice-pills { gap: 16px; }
    body.export-mode .choice-pill { padding: 18px 24px; font-size: 22px; min-width: 190px; }
  </style>
</head>
<body>
  <div class="stories-frame frame-wrapper">
    <div class="stories-viewport frame-container">
      <div class="stories-track" id="storiesTrack">
        
        <section class="frame story frame-1 cover" data-text-variant="light" style='background: linear-gradient(rgba(0,0,0,0.52), rgba(0,0,0,0.52)), url(squads/social-growth/output/amiclube/blog/imagens/AC-30-13B-campanha-investimento-em-decoração_-artesanal-no-home-office/instagram-reels/instagram%20reels-investimento-em-decoracao-artesanal-v1.webp) center/cover no-repeat;'>
          <span class="brand-mark">AmiClube</span>
          <div class="content-creative center">
            <span class="eyebrow">DECORAÇÃO ARTESANAL</span>
            <h1 class="title">Qual estilo combina mais?</h1>
            
            <div class="choice-pills"><span class="choice-pill primary">Mesa</span><span class="choice-pill ">Estante</span></div>
            
          </div>
        </section>

        <section class="frame story frame-2 content" data-text-variant="dark" style='background: linear-gradient(145deg, #F7F0E6, #EAD9C8); background-image: url("data:image/svg+xml,%3Csvg%20viewBox%3D%270%200%20200%20200%27%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%3E%3Cfilter%20id%3D%27n%27%3E%3CfeTurbulence%20type%3D%27turbulence%27%20baseFrequency%3D%270.65%27%20numOctaves%3D%273%27%20stitchTiles%3D%27stitch%27%2F%3E%3C%2Ffilter%3E%3Crect%20width%3D%27100%25%27%20height%3D%27100%25%27%20filter%3D%27url(%23n)%27%20opacity%3D%270.06%27%2F%3E%3C%2Fsvg%3E"), linear-gradient(145deg, #F7F0E6, #EAD9C8);'>
          <span class="brand-mark">AmiClube</span>
          <div class="content-creative center">
            <span class="eyebrow">SAIBA MAIS</span>
            <h2 class="heading">O artigo mostra onde cada opção funciona melhor:</h2>
            <p class="body-text">Mesa • Estante • Fundo de câmera</p>
            
            
          </div>
        </section>

        <section class="frame story frame-3 cta" data-text-variant="dark" style='background: radial-gradient(circle at 22% 12%, var(--style-accent-soft), transparent 34%), linear-gradient(145deg, #F0E5D8, #E1C7B4);'>
          <span class="brand-mark">AmiClube</span>
          <div class="content-creative center">
            <span class="eyebrow">SUA VEZ</span>
            <h2 class="heading">Vote!</h2>
            <p class="body-text">Mande a opção no Direct</p>
            
            <div class="cta-block">Mande a opção no Direct</div>
          </div>
        </section>
      </div>
    </div>
    <div class="stories-progress" id="storyProgress"><div class="seg active"></div><div class="seg "></div><div class="seg "></div></div>
    <div class="nav-overlay prev" onclick="prevFrame()"></div>
    <div class="nav-overlay next" onclick="nextFrame()"></div>
  </div>
  <script>
    const track = document.getElementById('storiesTrack');
    const segs = [...document.querySelectorAll('#storyProgress .seg')];
    let current = 0;

    function showFrame(index) {
      current = Math.max(0, Math.min(index, segs.length - 1));
      track.style.transform = `translateY(-${current * 100}%)`;
      segs.forEach((seg, i) => seg.classList.toggle('active', i <= current));
    }

    function nextFrame() { showFrame(current + 1); }
    function prevFrame() { showFrame(current - 1); }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowDown') showFrame(current + 1);
      if (e.key === 'ArrowUp') showFrame(current - 1);
    });
  </script>
</body>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Como fechar seu pedido com confiança · AmiClube</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" />
  <style>
    :root {
  --ds-preview-w: 420px;
  --ds-preview-h: 525px;
  --ds-export-w: 1080px;
  --ds-export-h: 1350px;
  --ds-scale: 2.5714285714;

  --ds-space-1: 8px;
  --ds-space-2: 16px;
  --ds-space-3: 24px;
  --ds-space-4: 32px;
  --ds-space-5: 40px;
  --ds-space-6: 48px;
  --ds-space-7: 56px;
  --ds-space-8: 64px;

  --ds-radius-sm: 10px;
  --ds-radius-md: 16px;
  --ds-radius-lg: 24px;
  --ds-shadow-soft: 0 18px 50px rgba(0, 0, 0, 0.22);
  --ds-shadow-text: 0 3px 16px rgba(0, 0, 0, 0.28);

  --ds-font-hero: 34px;
  --ds-font-heading: 26px;
  --ds-font-body: 15px;
  --ds-font-caption: 10px;
  --ds-export-font-hero: 78px;
  --ds-export-font-heading: 58px;
  --ds-export-font-body: 34px;
  --ds-export-font-caption: 24px;

  --ds-content-pad-x: 36px;
  --ds-export-content-pad-x: 80px;
}

    :root {
  --style-name: "editorial-myth";
  --style-bg: #F7F3EE;
  --style-bg-alt: #1A1918;
  --style-surface: rgba(0, 0, 0, 0.05);
  --style-surface-strong: rgba(0, 0, 0, 0.12);
  --style-text-heading: #1A1918;
  --style-text-body: #1A1918;
  --style-text-muted: #8C6A5E;
  --style-accent: #C45C1F;
  --style-accent-soft: color-mix(in srgb, #C45C1F 22%, transparent);
  --style-border: color-mix(in srgb, #C45C1F 42%, transparent);
  --style-heading-font: "Playfair Display", Georgia, serif;
  --style-body-font: "DM Sans", Arial, sans-serif;
  --style-noise-opacity: 0.025;
  --style-vignette-opacity: 0.08;
  --style-gradient: linear-gradient(165deg, #8C6A5E 0%, #C45C1F 50%, #D9A85A 100%);
}

[data-text-variant="dark"] .eyebrow {
  color: #D9A85A;
  background: rgba(255,255,255,0.10);
  border-color: rgba(255,255,255,0.15);
}

[data-text-variant="dark"] .title,
[data-text-variant="dark"] .heading {
  color: #fff;
}

[data-text-variant="dark"] .body-text,
[data-text-variant="dark"] .subtitle {
  color: rgba(255, 255, 255, 0.85);
}

[data-text-variant="dark"] .proof-card {
  background: rgba(0, 0, 0, 0.15);
  border-color: rgba(255, 255, 255, 0.08);
  color: #fff;
  font-family: var(--style-heading-font);
  font-style: italic;
  font-size: 15px;
  line-height: 1.4;
}

[data-text-variant="dark"] .cta-block {
  color: #fff;
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.15);
}

[data-text-variant="dark"] .divider {
  background: #D9A85A;
  box-shadow: 0 0 22px color-mix(in srgb, #D9A85A 40%, transparent);
}

[data-text-variant="dark"] .header-zone {
  color: rgba(255,255,255,0.5);
}

[data-text-variant="dark"] .brand-mark {
  color: #D9A85A;
}

[data-text-variant="dark"] .footer-zone {
  color: rgba(255,255,255,0.4);
}

[data-text-variant="dark"] .progress-bar {
  background: rgba(255,255,255,0.10);
}

[data-text-variant="dark"] .progress-bar span {
  background: #fff;
}

[data-text-variant="dark"] .swipe-arrow {
  color: rgba(255,255,255,0.35);
}

:root {
  --style-accent: #C45C1F;
}

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; flex-direction: column;
      align-items: center; min-height: 100vh;
      font-family: var(--style-body-font);
      color: var(--style-text-body);
    }

    .frame {
      width: var(--ds-preview-w); height: var(--ds-preview-h);
      position: relative; overflow: hidden;
      background: var(--style-bg-alt);
    }

    .bg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      filter: saturate(1.08) contrast(1.04);
    }

    .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(26,26,26,0.15) 0%, rgba(26,26,26,0.45) 40%, rgba(26,26,26,0.78) 100%);
    }

    .brand-top {
      position: absolute; top: 24px; left: 28px; z-index: 3;
      display: flex; align-items: center; gap: 10px;
    }

    .brand-marker {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--style-accent); display: flex; align-items: center;
      justify-content: center; color: #fff; font-size: 11px; font-weight: 700;
    }

    .brand-name {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,0.7);
    }

    .content {
      position: absolute; inset: 0; z-index: 2;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 60px 48px; text-align: center;
    }

    .eyebrow {
      font-size: 10px; font-weight: 600; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--style-accent);
      margin-bottom: 16px;
    }

    .headline {
      font-family: var(--style-heading-font);
      font-size: var(--ds-font-hero);
      font-weight: 700; line-height: 1.15;
      color: #fff; margin-bottom: 16px; max-width: 360px;
    }

    .divider {
      width: 40px; height: 1px; background: var(--style-accent);
      margin-bottom: 16px;
    }

    .body-text {
      font-size: var(--ds-font-body);
      line-height: 1.6; color: rgba(255,255,255,0.7);
      max-width: 340px;
    }

    .cta {
      margin-top: 20px; font-size: 13px; font-weight: 600;
      color: var(--style-accent); letter-spacing: 0.5px;
    }

    .brand-bottom {
      position: absolute; bottom: 24px; right: 28px; z-index: 3;
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,0.25);
    }

    body.export-mode {
      background: var(--style-bg-alt);
    }

    body.export-mode .frame {
      width: var(--ds-export-w) !important;
      height: var(--ds-export-h) !important;
    }

    body.export-mode .brand-top,
    body.export-mode .brand-bottom { display: none !important; }

    body.export-mode .content { padding: 150px 120px !important; }
    body.export-mode .eyebrow { font-size: 26px !important; letter-spacing: 6.5px !important; margin-bottom: 41px !important; }
    body.export-mode .headline { font-size: var(--ds-export-font-hero) !important; line-height: 1.15 !important; margin-bottom: 41px !important; max-width: 920px !important; }
    body.export-mode .divider { width: 103px !important; height: 2px !important; margin-bottom: 41px !important; }
    body.export-mode .body-text { font-size: var(--ds-export-font-body) !important; line-height: 1.6 !important; max-width: 870px !important; }
    body.export-mode .cta { margin-top: 52px !important; font-size: 33px !important; letter-spacing: 1px !important; }
  </style>
</head>
<body>
  <article class="frame">
    <img class="bg" src="../../blog/imagens/AC-30-13-campanha-guia-de-compra-inteligente-de-amigurumi/linkedin/linkedin-guia-de-compra-inteligente-v1.png" alt="" />
    <div class="overlay"></div>

    <div class="brand-top">
      <div class="brand-marker">A</div>
      <span class="brand-name">AmiClube</span>
    </div>

    <div class="content">
      <span class="eyebrow">guia rápido</span>
      <h1 class="headline">Como fechar seu pedido com confiança</h1>
      <div class="divider"></div>
      <p class="body-text">Atendimento claro, peça certa, contexto ideal.
Reduza o atrito e aumente a confiança na sua escolha.</p>
      <p class="cta">Leia o artigo completo no link da bio →</p>
    </div>

    <div class="brand-bottom">AmiClube</div>
  </article>
</body>
</html>

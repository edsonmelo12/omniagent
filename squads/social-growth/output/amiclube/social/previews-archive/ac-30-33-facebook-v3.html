<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AC-30-33 v3 — Facebook Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-purple: #1E1B4B;
      --text-white: #FFFFFF;
      --accent-pink: #F472B6;
      --accent-cyan: #22D3EE;
      --accent-green: #22C55D;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .preview-container { max-width: 1200px; margin: 0 auto; }

    .preview-header { text-align: center; margin-bottom: 30px; }
    .preview-header h1 { font-size: 24px; color: #F472B6; margin-bottom: 8px; font-family: 'Montserrat', sans-serif; font-weight: 900; }
    .preview-header p { font-size: 14px; color: #666; }
    .preview-meta { display: flex; gap: 12px; justify-content: center; margin-top: 8px; }

    .badge { background: #F472B6; color: white; padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 700; }
    .badge.style { background: #1E1B4B; border: 1px solid #F472B6; }

    .post-wrapper {
      width: 600px; height: 315px;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(244,114,182,0.25);
      background: var(--bg-purple);
    }

    .post {
      width: 100%; height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 24px 32px;
    }

    .post::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(ellipse at 0% 0%, rgba(244,114,182,0.2) 0%, transparent 40%),
        radial-gradient(ellipse at 100% 100%, rgba(34,211,238,0.15) 0%, transparent 40%);
      pointer-events: none;
    }

    .split-line {
      position: absolute;
      left: 40%;
      top: 10%; bottom: 10%;
      width: 2px;
      background: linear-gradient(to bottom, var(--accent-pink), var(--accent-cyan));
    }

    .post-content { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; }

    .post-header { margin-bottom: 12px; }
    .post-header.left { flex: 1; padding-right: 20px; }
    .post-header.right { flex: 1; padding-left: 8px; justify-content: center; display: flex; flex-direction: column; }

    .post-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 32px;
      font-weight: 900;
      color: var(--text-white);
      line-height: 1;
    }

    .post-title .pink { color: var(--accent-pink); }
    .post-title .cyan { color: var(--accent-cyan); }

    .post-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      margin-top: 8px;
    }

    .checklist { list-style: none; }
    .checklist li {
      font-size: 18px;
      color: var(--text-white);
      margin-bottom: 8px;
      font-weight: 600;
      display: flex; align-items: center; gap: 10px;
    }

    .checklist li .icon {
      width: 24px; height: 24px;
      background: var(--accent-green);
      color: white;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }

    .post-footer { margin-top: auto; }
    .signature {
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      color: rgba(255,255,255,0.6);
    }

    .export-info { text-align: center; margin-top: 30px; padding: 20px; background: #1E1B4B; border-radius: 8px; }
    .export-info h3 { font-size: 16px; color: #888; margin-bottom: 8px; }
    .export-info p { font-size: 14px; color: #555; }
  </style>
</head>
<body>
  <div class="preview-container">
    <div class="preview-header">
      <h1>AC-30-33 v3 — Facebook Post</h1>
      <p>1 frame • High-Energy Cyber • 1200x630px</p>
      <div class="preview-meta">
        <span class="badge">v3</span>
        <span class="badge style">High-Energy Cyber</span>
        <span class="badge">AC-30-09B</span>
      </div>
    </div>

    <div class="post-wrapper">
      <div class="post">
        <span class="split-line"></span>
        <div class="post-content">
          <div class="post-header left">
            <h2 class="post-title"><span class="pink">PRO</span>TOCOLO</h2>
            <h2 class="post-title" style="margin-top: 4px;"><span class="cyan">SEGURANÇA</span></h2>
            <p class="post-subtitle">não vendemos — confirmamos.</p>
          </div>
          <div class="post-header right">
            <ul class="checklist">
              <li><span class="icon">✓</span> Acabamento</li>
              <li><span class="icon">✓</span> Tração</li>
              <li><span class="icon">✓</span> Materiais</li>
            </ul>
          </div>
        </div>
        <div class="post-footer">
          <p class="signature">É protocolo. Não marketing.</p>
        </div>
      </div>
    </div>

    <div class="export-info">
      <h3>Export Ready</h3>
      <p>1 PNG • 1200x630px • 2x Retina</p>
    </div>
  </div>
</body>
</html>

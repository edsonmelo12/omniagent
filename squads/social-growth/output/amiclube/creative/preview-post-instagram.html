<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Criativo - AmiClube</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .instagram-post {
            background: white;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #dbdbdb;
        }
        .post-header {
            padding: 12px;
            display: flex;
            align-items: center;
        }
        .profile-pic {
            width: 32px;
            height: 32px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            border-radius: 50%;
            margin-right: 10px;
        }
        .username {
            font-weight: 600;
            font-size: 14px;
        }
        .post-image {
            width: 400px;
            height: 400px;
            background-color: #fce4ec; /* Rosa pastel */
            background-image: url('https://images.unsplash.com/photo-1634127521746-86d3bc01b0b5?q=80&w=800&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
            color: #4a148c; /* Roxo escuro */
        }
        .overlay {
            background: rgba(255, 255, 255, 0.7);
            padding: 20px;
            margin: 20px;
            border-radius: 8px;
            border: 2px solid #f06292;
        }
        .post-image h1 {
            font-size: 24px;
            margin: 0;
            line-height: 1.2;
            text-transform: uppercase;
        }
        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ffd54f;
            color: #5d4037;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
        .post-footer {
            padding: 12px;
        }
        .actions {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .caption {
            font-size: 14px;
            line-height: 1.4;
        }
        .caption b {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="instagram-post">
        <div class="post-header">
            <div class="profile-pic"></div>
            <div class="username">amiclube</div>
        </div>
        <div class="post-image">
            <div class="badge">DICA DE OURO</div>
            <div class="overlay">
                <h1>7 Erros que detonam seu Amigurumi</h1>
                <p>(e como consertar hoje)</p>
            </div>
        </div>
        <div class="post-footer">
            <div class="actions">❤️ 💬 ✈️</div>
            <div class="caption">
                <b>amiclube</b> Se você está começando no mundo dos Amigurumis, sabe que a frustração de terminar uma peça e sentir que algo está "estranho" é real...
            </div>
        </div>
    </div>
</body>
</html>


<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1c1917; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'DM Sans', sans-serif; }
        
        .ig-viewport { 
            width: 420px; 
            height: 525px; 
            position: relative; 
            overflow: hidden; 
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 40px;
            color: #ffffff;
            text-align: center;
        }

        .tag {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #D4A373;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            line-height: 1.1;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 15px;
            opacity: 0.9;
            font-weight: 400;
        }

        /* UI Elements */
        .progress-bar {
            position: absolute;
            bottom: 20px;
            left: 28px;
            right: 28px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            z-index: 10;
        }
        .progress-fill {
            width: 14.2%;
            height: 100%;
            background: #ffffff;
            border-radius: 2px;
        }
        .handle {
            position: absolute;
            top: 25px;
            left: 0;
            right: 0;
            font-size: 12px;
            font-weight: 700;
            opacity: 0.8;
            letter-spacing: 1px;
            z-index: 10;
            text-align: center;
        }
    </style>
</head>
